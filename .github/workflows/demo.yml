name: Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  demo:
    name: Demo (pack → push → pull → install → uninstall)
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build striatum
        run: go build -o ${{ github.workspace }}/striatum ./cmd/striatum

      - name: Run demo
        env:
          STRIATUM_DEMO_REGISTRY: localhost:5000/demo
          STRIATUM_BIN: ${{ github.workspace }}/striatum
          STRIATUM_HOME: ${{ runner.temp }}/striatum-demo
          HOME: ${{ runner.temp }}/demo-home
        run: bash scripts/demo.sh
