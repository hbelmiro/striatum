name: Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  demo:
    name: Demo (pack → push → pull → install → uninstall)
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build striatum
        run: go build -o ${{ github.workspace }}/striatum ./cmd/striatum

      - name: Run demo
        env:
          STRIATUM_DEMO_REGISTRY: localhost:5000/demo
          STRIATUM_BIN: ${{ github.workspace }}/striatum
          STRIATUM_HOME: ${{ runner.temp }}/striatum-demo
          HOME: ${{ runner.temp }}/demo-home
        run: bash scripts/demo.sh
